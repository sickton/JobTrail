# Application
spring.application.name=jobtrail-api
server.port=${PORT:8080}

# DataSource — Railway injects PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD automatically
# Falls back to local dev vars if Railway vars are not present
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:jobtrail}?sslmode=require
spring.datasource.username=${PGUSER:${DB_USERNAME:postgres}}
spring.datasource.password=${PGPASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# JWT authentication
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Open AI Usage
openai.api.key=${OPENAI_API_KEY}

# Cloudinary cloud file storage keys
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# File upload limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
